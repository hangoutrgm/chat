console.log("App Visible");

document.getElementById("main-app-container").classList.remove("hidden");

        const colors = ["#f87171", "#fb923c", "#fbbf24", "#34d399", "#2dd4bf", "#38bdf8", "#818cf8", "#c084fc", "#f472b6"];

        const bannedWords = ["spamword1", "spamword2", "offensiveword"]; 
        function filterText(text) {
            let filtered = text;
            bannedWords.forEach(word => {
                const regex = new RegExp(word, "gi");
                filtered = filtered.replace(regex, "****");
            });
            return filtered;
        }

        function compressImage(file, maxWidth, maxHeight, quality = 0.6) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = event => {
                    if (file.type === 'image/gif') {
                        if (file.size > 1024 * 1024) return reject("GIF is too large! Maximum allowed is 1MB.");
                        return resolve(event.target.result);
                    }
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        if (width > height) {
                            if (width > maxWidth) { height *= maxWidth / width; width = maxWidth; }
                        } else {
                            if (height > maxHeight) { width *= maxHeight / height; height = maxHeight; }
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', quality));
                    };
                };
            });
        }

            const today = new Date().toDateString();
            let limitData = JSON.parse(localStorage.getItem('upload_limits')) || { date: today, count: 0 };

            return limitData;
        }

        function incrementUploadCount() {
            const limitData = getUploadCount();
            limitData.count++;
            localStorage.setItem('upload_limits', JSON.stringify(limitData));
            updateCounterUI();
        }

        function updateCounterUI() {
            const count = getUploadCount().count;
            document.getElementById("upload-counter").innerText = `Limits: ${count}/5 uploads today`;
        }

        function checkCanUpload() {
            if (getUploadCount().count >= 5) {
                alert("You have reached your daily limit of 5 media uploads. Try again tomorrow!");
                return false;
            }
            return true;
        }

            } else {
                currentUser.name = `${adjectives[Math.floor(Math.random() * adjectives.length)]} ${nouns[Math.floor(Math.random() * nouns.length)]}`;

                localStorage.setItem("anon_name", currentUser.name);
                localStorage.setItem("anon_color", currentUser.color);
            }
            updateIdentityUI();
        }

        function updateIdentityUI() {
            const tag = document.getElementById("identity-tag");
            tag.innerText = currentUser.name;
            tag.style.backgroundColor = currentUser.color;
            
            const sidebarAvatar = document.getElementById("sidebar-avatar");

        const renameModal = document.getElementById("rename-modal");

        const messageInput = document.getElementById("message-input");
        const messagesRef = ref(db, "messages");
        

        messageForm.addEventListener("submit", (e) => {
            e.preventDefault();
            const textRaw = messageInput.value.trim();
            
            if (!textRaw && !pendingImageUpload) return;

            const messagePayload = {
    name: currentUser.name,
    color: currentUser.color,
    avatar: currentUser.avatar || null,

    // Device identity (used for presence and device bans)
    uid: myUid,

    // Firebase identity (used for ownership/security)
    authUid: auth.currentUser.uid,

    timestamp: serverTimestamp()
};

            if (textRaw) messagePayload.text = filterText(textRaw);
            if (pendingImageUpload) {
                messagePayload.image = pendingImageUpload;
                incrementUploadCount(); 
            }
            if (activeReplyTarget) messagePayload.replyTo = activeReplyTarget;

            push(messagesRef, messagePayload);
            clearReplyState();
            clearImagePreview();
            messageForm.reset();
        });

        window.setReplyTarget = function(msgId, senderName, rawText) {
            activeReplyTarget = { id: msgId, name: senderName, text: rawText || 'Attachment' };
            document.getElementById("reply-target-name").innerText = senderName;
            document.getElementById("reply-target-text").innerText = rawText || 'Attached Image';
            document.getElementById("reply-preview").classList.remove("hidden");
            messageInput.focus();
        };

        function clearReplyState() {
            activeReplyTarget = null;
            document.getElementById("reply-preview").classList.add("hidden");
        }
        document.getElementById("cancel-reply-btn").addEventListener("click", clearReplyState);

        window.openReactionMenu = function(msgId, clientX, clientY, currentActiveEmoji) {
            targetedMenuMsgId = msgId;
            const quickOptions = ["👍", "❤️", "😂"];
            quickOptions.forEach(emoji => {
                const btn = document.getElementById(`btn-react-${emoji}`);
                if (emoji === currentActiveEmoji) {
                    btn.className = "w-8 h-8 flex items-center justify-center rounded-full text-base bg-emerald-600 border border-emerald-400 scale-110 text-white font-bold transition cursor-pointer animate-pulse";
                } else {
                    btn.className = "w-8 h-8 flex items-center justify-center rounded-full text-base hover:bg-slate-700/60 transition cursor-pointer text-slate-300";
                }
            });
            pickerMenu.style.left = `${Math.min(clientX, window.innerWidth - 160)}px`;
            pickerMenu.style.top = `${Math.min(clientY - 50, window.innerHeight - 100)}px`;
            pickerMenu.classList.remove("hidden");
        };

        window.handlePickerSelection = function(emoji) {
            if (!targetedMenuMsgId) return;
            const msgId = targetedMenuMsgId;
            const targetMessageBubble = document.getElementById(`msg-${msgId}`).querySelector('.interactive-bubble');
            const priorReaction = targetMessageBubble.getAttribute('data-my-reaction');
            const quickOptions = ["👍", "❤️", "😂"];
            quickOptions.forEach(opt => { set(ref(db, `messages/${msgId}/reactions/${opt}/${myUid}`), null); });
            if (emoji !== priorReaction) { set(ref(db, `messages/${msgId}/reactions/${emoji}/${myUid}`), true); }
            closeReactionMenu();
        };

        function closeReactionMenu() {
            pickerMenu.classList.add("hidden");
            targetedMenuMsgId = null;
        }

        document.addEventListener("click", (e) => {
            if (!pickerMenu.contains(e.target) && !e.target.closest('.interactive-bubble')) closeReactionMenu();
        });

        function renderOrUpdateMessage(msgId, data) {
            if (!data) return;
            window.messageDataCache[msgId] = data;
            
            let msgElement = document.getElementById(`msg-${msgId}`);
            const isNew = !msgElement;
            if (isNew) {
                msgElement = document.createElement("div");
                msgElement.id = `msg-${msgId}`;
            }

            const isMe = data.authUid
    ? (data.authUid === auth.currentUser.uid)
    : (data.uid === myUid);
            
            let activePillsHtml = "";
            let userReactionMatch = "";
            if (data.reactions) {
                Object.keys(data.reactions).forEach(emoji => {
                    const count = Object.keys(data.reactions[emoji]).length;
                    if (count > 0) {
                        const hasMine = data.reactions[emoji][myUid];
                        if (hasMine) userReactionMatch = emoji;
                        const pillClass = hasMine ? "bg-emerald-950/80 border-emerald-500 text-emerald-400 font-bold" : "bg-slate-800 border-slate-700 text-slate-400";
                        activePillsHtml += `<div class="flex items-center gap-1 border rounded-full px-1.5 py-0.5 text-[10px] shadow-xs select-none ${pillClass}"><span>${emoji}</span><span>${count}</span></div>`;
                    }
                });
            }

            let replyContextHtml = "";
            if (data.replyTo) {
                replyContextHtml = `
                    <div class="border-l-2 border-slate-500 bg-slate-900/40 px-2 py-0.5 rounded text-[11px] text-slate-400 mb-0.5 italic text-left truncate w-full max-w-xs select-none">
                        <span class="text-slate-300 font-bold not-italic block text-[10px]">${data.replyTo.name}:</span>
                        "${data.replyTo.text}"
                    </div>
                `;
            }

            let userAvatarHtml = data.avatar 
                ? `<img src="${data.avatar}" class="w-7 h-7 rounded-full object-cover shadow-sm flex-shrink-0 relative top-0.5 border border-slate-700/50" alt="${data.name}">`
                : `<div class="w-7 h-7 rounded-full flex items-center justify-center font-bold text-xs text-slate-900 select-none shadow-sm flex-shrink-0 relative top-0.5" style="background-color: ${data.color}">${data.name.charAt(0)}</div>`;

            let attachedImageHtml = data.image 
                ? `<div class="${data.text ? 'mt-2' : ''}"><img src="${data.image}" class="max-w-full max-h-64 rounded-lg object-contain shadow-sm border border-black/20"></div>`
                : "";

            const bubbleRowClass = isMe ? "flex gap-2 items-start max-w-full flex-row-reverse text-right justify-start" : "flex gap-2 items-start max-w-full justify-start";
            const bubbleAlignClass = isMe ? "items-end" : "items-start";
            const colorBubbleClass = isMe ? "bg-emerald-600 border border-emerald-500/50 text-white" : "bg-slate-800 border border-slate-700/50 text-slate-200";
            const editedTag = data.edited ? `<span class="text-[9px] text-emerald-200/70 italic ml-1 select-none">(edited)</span>` : "";
            
            let textHtml = data.text ? `<span>${data.text}</span>${editedTag}` : "";

            let actionButtons = "";
            if (isMe) {
                if(data.text) {
                    actionButtons += `<button onclick="openEditModal('${msgId}')" class="text-[9px] text-slate-500 hover:text-emerald-400 transition cursor-pointer opacity-80 md:opacity-0 group-hover:opacity-100">✏️ Edit</button>`;
                }
                actionButtons += `<button onclick="deleteMessage('${msgId}')" class="text-[9px] text-slate-500 hover:text-red-400 transition cursor-pointer opacity-80 md:opacity-0 group-hover:opacity-100">🗑️ Delete</button>`;
            }

            msgElement.className = `${bubbleRowClass} group mb-1`;
            msgElement.innerHTML = `
                ${userAvatarHtml}
                <div class="flex flex-col max-w-[80%] min-w-0 ${bubbleAlignClass}">
                    <div class="flex items-center gap-1.5 mb-0.5 select-none leading-none">
                        <span class="text-[11px] font-semibold ${isMe ? 'text-emerald-400' : 'text-slate-400'} truncate">${data.name} ${isMe ? '(You)' : ''}</span>
                        ${actionButtons}
                        <button onclick="setReplyTarget('${msgId}', '${data.name.replace(/'/g, "\\'")}', '${(data.text || 'Image').replace(/'/g, "\\'")}')" class="text-[9px] text-slate-500 hover:text-emerald-400 transition context-reply-trigger cursor-pointer opacity-80 md:opacity-0 group-hover:opacity-100">💬 Reply</button>
                    </div>
                    ${replyContextHtml}
                    <div class="interactive-bubble ${colorBubbleClass} rounded-2xl rounded-tl-none px-3 py-1.5 text-sm break-words shadow-sm text-left whitespace-pre-wrap relative cursor-pointer chat-bubble-text leading-tight inline-block w-fit max-w-full" data-my-reaction="${userReactionMatch}">${textHtml}${attachedImageHtml}</div>
                    ${activePillsHtml ? `<div class="flex items-center gap-1 mt-0.5">${activePillsHtml}</div>` : ""}
                </div>
            `;

            if (isNew) {
                chatBox.appendChild(msgElement);
                const imgElements = msgElement.querySelectorAll('img');
                if (imgElements.length > 0) {
                    imgElements[0].onload = () => { chatBox.scrollTop = chatBox.scrollHeight; };
                } else {
                    chatBox.scrollTop = chatBox.scrollHeight;
                }
            }

            const bubbleElement = msgElement.querySelector('.interactive-bubble');
            let longPressTimer;
            const freshBubble = bubbleElement.cloneNode(true);
            bubbleElement.parentNode.replaceChild(freshBubble, bubbleElement);

            freshBubble.addEventListener('touchstart', (e) => {
                longPressTimer = setTimeout(() => {
                    const touch = e.touches[0];
                    const activeStateEmoji = freshBubble.getAttribute('data-my-reaction');
                    openReactionMenu(msgId, touch.clientX, touch.clientY, activeStateEmoji);
                }, 400); 
            });
            freshBubble.addEventListener('touchend', () => clearTimeout(longPressTimer));
            freshBubble.addEventListener('touchmove', () => clearTimeout(longPressTimer));

            freshBubble.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                const activeStateEmoji = freshBubble.getAttribute('data-my-reaction');
                openReactionMenu(msgId, e.clientX, e.clientY, activeStateEmoji);
            });
        }

        console.time("Identity");
initializeIdentity();
console.timeEnd("Identity");
    </script>
</body>
</html>

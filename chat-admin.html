<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Admin Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans h-screen flex flex-col m-0 overflow-hidden">

    <div id="login-screen" class="flex-1 flex items-center justify-center p-4 z-50 bg-slate-900 absolute inset-0">
        <div class="bg-slate-800 border border-slate-700 p-8 rounded-2xl max-w-sm w-full shadow-2xl flex flex-col gap-4 text-center">
            <h2 class="text-2xl font-bold text-emerald-400">Admin Login</h2>
            <p class="text-xs text-slate-400 mb-2">Log in with your Firebase admin account.</p>
            
            <input type="email" id="admin-email-input" placeholder="Admin Email..." class="bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-center text-slate-100 focus:outline-none focus:border-emerald-500 w-full">
            <input type="password" id="admin-pass-input" placeholder="Password..." class="bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-center text-slate-100 focus:outline-none focus:border-emerald-500 w-full mt-2">
            
            <button id="login-btn" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-2 rounded-lg transition active:scale-95 shadow-md mt-2 cursor-pointer">Secure Login</button>
        </div>
    </div>

    <div id="admin-dashboard" class="hidden flex-col h-full">
        <header class="bg-slate-800 border-b border-slate-700 p-4 flex justify-between items-center shadow-md">
            <div>
                <h1 class="text-xl font-bold text-emerald-400 flex items-center gap-2">🛡️ Admin Dashboard</h1>
                <p class="text-xs text-slate-400">Global Room Moderation</p>
            </div>
            <button onclick="clearAllChats()" class="bg-red-600 hover:bg-red-500 text-white text-xs font-bold px-4 py-2 rounded-lg transition shadow-md active:scale-95 cursor-pointer flex items-center gap-1">
                ⚠️ Clear All Chats
            </button>
        </header>

        <div class="flex flex-1 overflow-hidden">
            <div class="flex-1 flex flex-col border-r border-slate-700">
                <div class="bg-slate-800/50 p-3 border-b border-slate-700 text-sm font-bold text-slate-300">Live Chat Feed</div>
                <div id="admin-chat-box" class="flex-1 overflow-y-auto p-4 space-y-3 bg-slate-900">
                    </div>
            </div>

            <div class="w-80 bg-slate-800 flex flex-col">
                <div class="p-3 border-b border-slate-700 text-sm font-bold text-red-400">Banned Devices (UIDs)</div>
                <div id="banned-list" class="flex-1 overflow-y-auto p-4 space-y-2">
                    </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onChildAdded, onChildRemoved, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        // 1. IMPORT AUTHENTICATION
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // ADD YOUR FIREBASE CONFIG HERE
        const firebaseConfig = {
  apiKey: "AIzaSyArP2nfx7HleG3zZXjHG3fTigwYD6Bnyag",
  authDomain: "hangoutchat-5d123.firebaseapp.com",
  databaseURL: "https://hangoutchat-5d123-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "hangoutchat-5d123",
  storageBucket: "hangoutchat-5d123.firebasestorage.app",
  messagingSenderId: "801481560526",
  appId: "1:801481560526:web:eb57b6eda4a0f7b3ec9b9f",
  measurementId: "G-2C6YR15QB9"
};

        // 2. INITIALIZE SERVICES
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app); 

        // --- SECURE AUTHENTICATION ---
        document.getElementById("login-btn").addEventListener("click", () => {
            const email = document.getElementById("admin-email-input").value;
            const password = document.getElementById("admin-pass-input").value;
            
            // Check to ensure fields aren't empty before trying to log in
            if(!email || !password) {
                alert("Please enter both email and password.");
                return;
            }

            document.getElementById("login-btn").innerText = "Verifying...";

            // Ask Firebase to verify the credentials
            signInWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {

    console.log("========== ADMIN LOGIN ==========");
    console.log("Email:", auth.currentUser.email);
    console.log("UID:", auth.currentUser.uid);

    document.getElementById("login-screen").classList.add("hidden");
    document.getElementById("admin-dashboard").classList.remove("hidden");
    document.getElementById("admin-dashboard").classList.add("flex");

    startAdminListeners();
})
                .catch((error) => {
                    // Failed! Show the error
                    document.getElementById("login-btn").innerText = "Secure Login";
                    alert("Admin Access Denied: " + error.message);
                });
        });

        // --- ADMIN CONTROLS ---
        window.clearAllChats = function() {
            if (confirm("🚨 WARNING: Are you sure you want to delete ALL messages in the global chat? This cannot be undone!")) {
                set(ref(db, "messages"), null);
                document.getElementById("admin-chat-box").innerHTML = ""; 
                alert("Global chat has been wiped clean.");
            }
        };

        window.banUser = function(uid, name) {
            if (confirm(`Ban user '${name}' (UID: ${uid})? They will be permanently locked out.`)) {
                set(ref(db, `banned_users/${uid}`), true);
            }
        };

        window.unbanUser = function(uid) {
            if (confirm(`Unban UID: ${uid}?`)) {
                remove(ref(db, `banned_users/${uid}`));
            }
        };

        window.deleteSingleMessage = function(msgId) {
            remove(ref(db, `messages/${msgId}`));
        };

        function startAdminListeners() {
            const adminChatBox = document.getElementById("admin-chat-box");
            onChildAdded(ref(db, "messages"), (snapshot) => {
                const data = snapshot.val();
                const msgId = snapshot.key;
                
                const el = document.createElement("div");
                el.id = `admin-msg-${msgId}`;
                el.className = "bg-slate-800 border border-slate-700 p-3 rounded-lg text-sm shadow-sm flex flex-col gap-2";
                
                let content = data.text ? `<p class="text-slate-200">"${data.text}"</p>` : "";
                if (data.image) content += `<img src="${data.image}" class="h-16 w-auto rounded object-cover mt-1 border border-slate-600">`;

                el.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div class="flex items-center gap-2">
                            <span class="font-bold text-emerald-400">${data.name}</span>
                            <span class="text-[10px] text-slate-500 bg-slate-900 px-1.5 py-0.5 rounded">UID: ${data.uid}</span>
                        </div>
                        <div class="flex gap-1">
                            <button onclick="deleteSingleMessage('${msgId}')" class="bg-slate-700 hover:bg-slate-600 text-xs px-2 py-1 rounded cursor-pointer transition">🗑️ Del</button>
                            <button onclick="banUser('${data.uid}', '${data.name.replace(/'/g, "\\'")}')" class="bg-red-900 hover:bg-red-800 text-red-100 text-xs px-2 py-1 rounded border border-red-700 cursor-pointer transition">🔨 BAN</button>
                        </div>
                    </div>
                    ${content}
                `;
                adminChatBox.appendChild(el);
                adminChatBox.scrollTop = adminChatBox.scrollHeight;
            });

            onChildRemoved(ref(db, "messages"), (snapshot) => {
                const el = document.getElementById(`admin-msg-${snapshot.key}`);
                if (el) el.remove();
            });

            const bannedList = document.getElementById("banned-list");
            onValue(ref(db, "banned_users"), (snapshot) => {
                bannedList.innerHTML = "";
                if (snapshot.exists()) {
                    const bans = snapshot.val();
                    Object.keys(bans).forEach(uid => {
                        const el = document.createElement("div");
                        el.className = "bg-slate-900 border border-red-900/50 p-2 rounded flex justify-between items-center";
                        el.innerHTML = `
                            <span class="text-[10px] font-mono text-slate-400 truncate w-32" title="${uid}">${uid}</span>
                            <button onclick="unbanUser('${uid}')" class="text-[10px] bg-slate-700 hover:bg-slate-600 px-2 py-1 rounded cursor-pointer">Unban</button>
                        `;
                        bannedList.appendChild(el);
                    });
                } else {
                    bannedList.innerHTML = `<div class="text-xs text-slate-500 text-center mt-4">No banned users.</div>`;
                }
            });
        }
    </script>
</body>
</html>
